<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CSS Feud</title>
<!--
  ============================================================
  CSS FEUD — live employee game show
  One file. Five modes via URL:
    index.html?mode=admin           Admin / host / judge portal (password: see CONFIG)
    index.html?mode=game            Main screen for the big display
    index.html?mode=survey          Employee survey page (via QR)
    index.html?mode=buzzer&team=1   Team 1 buzzer
    index.html?mode=buzzer&team=2   Team 2 buzzer

  FIREBASE SETUP (for multi-device play):
    1. console.firebase.google.com → Add project (any name).
    2. Build → Realtime Database → Create database → start in TEST mode.
    3. Build → Authentication → Sign-in method → enable "Anonymous".
    4. Project settings → General → Your apps → Web app → copy the config
       object and paste it into FIREBASE_CONFIG in the CONFIG section below.
    5. Host this file anywhere (see below) and open it — the app detects the
       config and switches from local demo mode to live Firebase sync.

  HOSTING (pick one):
    • Firebase Hosting: npm i -g firebase-tools → firebase init hosting
      (public dir = folder with this file) → firebase deploy
    • GitHub Pages: push index.html + css-feud-logo.png to a repo →
      Settings → Pages → deploy from branch.
    • Netlify: drag the folder onto app.netlify.com/drop.
    Phones must reach the SAME URL the QR codes encode, so use a public URL
    (not localhost) for the live event.

  Without Firebase the game runs in LOCAL DEMO MODE: everything works across
  tabs of the same browser (admin + game + survey + buzzers), synced through
  localStorage — perfect for rehearsal.
  ============================================================
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ================= AEGov DLS tokens ================= */
:root{
  --gold-200:#E6D7A2; --gold-300:#D7BC6D; --gold-400:#CBA344; --gold-500:#B68A35; --gold-600:#92722A; --gold-700:#7C5E24;
  --blue-100:#D3EDFF; --blue-200:#B0DBFF; --blue-300:#81C1FF; --blue-400:#4F98FF; --blue-500:#286CFF; --blue-900:#0B32A4; --blue-950:#071C5F;
  --ink-50:#F7F7F7; --ink-100:#E1E3E5; --ink-200:#C3C6CB; --ink-300:#9EA2A9; --ink-400:#797E86; --ink-500:#5F646D; --ink-700:#3E4046; --ink-800:#232528; --ink-900:#1B1D21; --ink-950:#0E0F12;
  --red-400:#F47A75; --red-500:#EA4F49; --red-600:#D83731; --red-700:#B52520;
  --green-500:#4A9D5C; --green-600:#3F8E50; --green-100:#E4F4E7;
  --camel-300:#FAD44F; --camel-400:#F8C027;
  --navy-1:#0A1638; --navy-2:#0E2158; --navy-3:#143079;
  --stage-bg: radial-gradient(130% 90% at 50% -12%, var(--navy-3) 0%, var(--navy-2) 42%, var(--navy-1) 78%, #060C22 100%);
  --card-radius:14px;
}
*{box-sizing:border-box} html,body{margin:0;padding:0}
body{font-family:Roboto,system-ui,sans-serif;color:var(--ink-800);background:var(--ink-50);-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:Inter,system-ui,sans-serif;margin:0}
a{color:var(--blue-500);text-decoration:none} a:hover{color:var(--blue-900);text-decoration:underline}
button{font-family:Inter,system-ui,sans-serif;cursor:pointer;border:none}
input,select,textarea{font-family:Roboto,system-ui,sans-serif;font-size:15px;padding:9px 12px;border:1.5px solid var(--ink-200);border-radius:8px;background:#fff;color:var(--ink-800);width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid var(--gold-400);outline-offset:1px;border-color:var(--gold-400)}
label{font-size:12.5px;font-weight:600;color:var(--ink-500);display:block;margin:10px 0 4px}
::placeholder{color:var(--ink-300)}

/* ================= buttons ================= */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:999px;font-weight:700;font-size:14.5px;padding:10px 20px;transition:background .15s,transform .1s;white-space:nowrap}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--gold-600);color:#fff}.btn-primary:hover{background:var(--gold-700)}
.btn-blue{background:var(--blue-500);color:#fff}.btn-blue:hover{background:var(--blue-900)}
.btn-green{background:var(--green-600);color:#fff}.btn-green:hover{background:#2F663C}
.btn-red{background:var(--red-600);color:#fff}.btn-red:hover{background:var(--red-700)}
.btn-outline{background:#fff;color:var(--ink-800);border:1.5px solid var(--ink-200)}.btn-outline:hover{border-color:var(--gold-500);color:var(--gold-700)}
.btn-ghost{background:transparent;color:var(--ink-500)}.btn-ghost:hover{background:var(--ink-100)}
.btn-big{font-size:17px;padding:14px 28px}
.btn-sm{font-size:12.5px;padding:6px 13px}
.btn[disabled]{opacity:.45;cursor:not-allowed;pointer-events:none}

/* ================= launcher ================= */
.launch{min-height:100vh;background:var(--stage-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:6px}
.launch img{width:min(340px,70vw);filter:drop-shadow(0 18px 40px rgba(0,0,0,.5))}
.launch p{color:var(--blue-200);margin:6px 0 22px;font-size:15px}
.launch-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;width:min(880px,100%)}
.launch-card{background:rgba(255,255,255,.06);border:1.5px solid rgba(129,193,255,.25);border-radius:var(--card-radius);padding:20px;color:#fff;display:flex;flex-direction:column;gap:6px;transition:.15s}
.launch-card:hover{background:rgba(255,255,255,.11);border-color:var(--gold-400);text-decoration:none;color:#fff;transform:translateY(-2px)}
.launch-card b{font-family:Inter;font-size:17px}
.launch-card span{font-size:13px;color:var(--blue-200)}
.launch-mode-tag{font-size:11px;letter-spacing:.08em;color:var(--gold-300);font-weight:700}

/* ================= admin ================= */
.admin{min-height:100vh;background:var(--ink-50)}
.admin-top{background:var(--ink-900);color:#fff;padding:10px 22px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:40}
.admin-top img{height:44px}
.admin-top .ttl{font-family:Inter;font-weight:800;font-size:17px}
.admin-top .sub{font-size:12px;color:var(--ink-300)}
.tabs{display:flex;gap:4px;background:#fff;border-bottom:1.5px solid var(--ink-100);padding:0 18px;overflow-x:auto;position:sticky;top:64px;z-index:39}
.tab{padding:13px 16px;font-family:Inter;font-weight:600;font-size:13.5px;color:var(--ink-500);border-bottom:3px solid transparent;background:none;white-space:nowrap}
.tab:hover{color:var(--ink-800)}
.tab.on{color:var(--gold-700);border-bottom-color:var(--gold-500)}
.admin-body{padding:20px;max-width:1240px;margin:0 auto}
.panel{background:#fff;border:1.5px solid var(--ink-100);border-radius:12px;padding:18px 20px;margin-bottom:16px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.panel h3{font-size:15px;font-weight:800;margin-bottom:4px}
.panel .hint{font-size:12.5px;color:var(--ink-400);margin:2px 0 10px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:820px){.grid2{grid-template-columns:1fr}}
.pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 12px;font-size:12px;font-weight:700}
.pill-gold{background:#F9F7ED;color:var(--gold-700);border:1px solid var(--gold-200)}
.pill-blue{background:var(--blue-100);color:var(--blue-900)}
.pill-green{background:var(--green-100);color:#2F663C}
.pill-red{background:#FDE4E3;color:var(--red-700)}
.pill-grey{background:var(--ink-100);color:var(--ink-500)}
.bigcount{font-family:Inter;font-weight:900;font-size:56px;color:var(--gold-600);line-height:1}
.qitem{display:flex;gap:10px;align-items:flex-start;border:1.5px solid var(--ink-100);border-radius:10px;padding:12px;margin-bottom:10px;background:#fff}
.qitem.cur{border-color:var(--gold-400);background:#FDFBF3}
.qnum{font-family:Inter;font-weight:800;color:var(--gold-600);min-width:26px;padding-top:2px}
.icon-btn{background:none;border:1px solid var(--ink-200);border-radius:8px;width:30px;height:30px;font-size:14px;color:var(--ink-500);line-height:1}
.icon-btn:hover{border-color:var(--gold-500);color:var(--gold-700)}
.group-row{display:flex;gap:8px;align-items:center;padding:8px 10px;border:1.5px solid var(--ink-100);border-radius:10px;margin-bottom:8px;background:#fff;flex-wrap:wrap}
.group-row.off{opacity:.45}
.group-row input[type=text]{flex:1;min-width:140px}
.group-row .cnt{font-family:Inter;font-weight:800;color:var(--blue-900);background:var(--blue-100);border-radius:8px;padding:4px 10px;font-size:13px;white-space:nowrap}
.group-row input.pts{width:74px;text-align:center;font-weight:700}
.members{font-size:11.5px;color:var(--ink-400);width:100%;padding-left:2px}
.judge-answer{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--ink-100);border-radius:10px;margin-bottom:8px;flex-wrap:wrap}
.judge-answer.rev{background:#F3FAF4;border-color:#CAE8CF}
.judge-answer .atext{font-weight:700;flex:1;min-width:120px}
.logrow{font-size:12.5px;padding:7px 4px;border-bottom:1px solid var(--ink-100);display:flex;gap:10px}
.logrow time{color:var(--ink-400);white-space:nowrap;font-variant-numeric:tabular-nums}
.danger-zone{border-color:#FDCDCB;background:#FFF8F8}
table.scores-t{width:100%;border-collapse:collapse;font-size:14px}
table.scores-t td,table.scores-t th{padding:8px 10px;border-bottom:1px solid var(--ink-100);text-align:left}
.login-wrap{min-height:100vh;background:var(--stage-bg);display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{background:#fff;border-radius:16px;padding:34px;width:min(400px,100%);box-shadow:0 12px 28px rgba(0,0,0,.35);text-align:center}
.login-card img{width:190px;margin-bottom:8px}
.qrbox-admin{background:#fff;border:1.5px solid var(--ink-100);border-radius:12px;padding:12px;display:inline-block}
.notice{border:1.5px solid var(--camel-300);background:#FFFBEB;border-radius:10px;padding:10px 14px;font-size:13px;color:#773610;margin-bottom:12px}
.helpdoc{font-size:13.5px;line-height:1.65;color:var(--ink-700)}
.helpdoc code{background:var(--ink-100);border-radius:5px;padding:1px 6px;font-size:12px}
.helpdoc h4{margin:14px 0 4px}
.helpdoc ol,.helpdoc ul{margin:4px 0;padding-left:20px}

/* ================= stage (game screen) ================= */
.stage{min-height:100vh;background:var(--stage-bg);color:#fff;display:flex;flex-direction:column;overflow:hidden}
.stage-top{display:flex;align-items:center;gap:18px;padding:14px 26px 6px}
.stage-top img{height:clamp(58px,8vw,96px);filter:drop-shadow(0 8px 22px rgba(0,0,0,.45))}
.stage-title{font-family:Inter;font-weight:900;font-size:clamp(22px,3vw,38px);letter-spacing:.01em;text-shadow:0 3px 14px rgba(0,0,0,.4)}
.stage-progress{font-size:clamp(13px,1.4vw,17px);color:var(--blue-200);font-weight:600}
.stage-tools{margin-left:auto;display:flex;gap:8px}
.tool-btn{background:rgba(255,255,255,.1);border:1.5px solid rgba(129,193,255,.3);color:#fff;border-radius:999px;padding:8px 16px;font-size:13px;font-weight:700}
.tool-btn:hover{background:rgba(255,255,255,.2)}
.stage-main{flex:1;display:grid;grid-template-columns:minmax(200px,300px) 1fr minmax(200px,300px);gap:18px;padding:12px 26px 18px;align-items:stretch;min-height:0}
@media(max-width:980px){.stage-main{grid-template-columns:1fr;overflow:auto}}
.team-panel{border-radius:18px;padding:18px;display:flex;flex-direction:column;gap:10px;background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.03));border:2px solid rgba(255,255,255,.14);position:relative;transition:box-shadow .3s,border-color .3s}
.team-panel.turn{border-color:var(--gold-400);box-shadow:0 0 0 3px rgba(203,163,68,.35),0 0 48px rgba(203,163,68,.35)}
.turn-flag{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:var(--gold-500);color:#fff;font-family:Inter;font-weight:800;font-size:11.5px;letter-spacing:.1em;border-radius:999px;padding:4px 14px;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.team-name{font-family:Inter;font-weight:800;font-size:clamp(18px,1.9vw,26px);display:flex;align-items:center;gap:10px;line-height:1.15}
.team-dot{width:16px;height:16px;border-radius:50%;flex:none;box-shadow:0 0 12px currentColor}
.team-logo{width:34px;height:34px;border-radius:8px;object-fit:cover;flex:none}
.team-score{font-family:Inter;font-weight:900;font-size:clamp(44px,5.5vw,76px);color:var(--camel-300);line-height:1;text-shadow:0 4px 18px rgba(248,192,39,.35);font-variant-numeric:tabular-nums;transition:transform .2s}
.team-score.bump{animation:bump .5s}
@keyframes bump{30%{transform:scale(1.22)}}
.round-pts{font-size:13px;color:var(--blue-200);font-weight:600}
.players{display:flex;flex-direction:column;gap:5px;margin-top:2px}
.player{font-size:clamp(13px,1.3vw,16px);color:var(--blue-100);padding:5px 12px;border-radius:8px;display:flex;gap:8px;align-items:center}
.player.now{background:rgba(203,163,68,.22);color:#fff;font-weight:700;outline:1.5px solid rgba(203,163,68,.6)}
.player .pnum{font-size:11px;color:var(--blue-300);font-family:Inter;font-weight:700;width:14px}
.stage-center{display:flex;flex-direction:column;gap:14px;min-width:0;min-height:0}
.qbanner{background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.04));border:2px solid rgba(129,193,255,.3);border-radius:18px;padding:16px 26px;text-align:center}
.qbanner .qtag{font-size:clamp(12px,1.2vw,15px);color:var(--gold-300);font-weight:800;font-family:Inter;letter-spacing:.12em;margin-bottom:6px}
.qbanner .qtext{font-family:Inter;font-weight:800;font-size:clamp(20px,2.6vw,36px);line-height:1.25;text-wrap:pretty}
.board{display:grid;gap:12px;flex:1;align-content:start}
.slot{perspective:1200px;height:clamp(58px,9vh,86px)}
.slot-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.2,.7,.3,1.1)}
.slot.open .slot-inner{transform:rotateX(180deg)}
.slot-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;display:flex;align-items:center;padding:0 22px}
.slot-front{background:linear-gradient(180deg,var(--navy-3),var(--blue-950));border:2px solid rgba(129,193,255,.4);justify-content:center}
.slot-front .n{font-family:Inter;font-weight:900;font-size:clamp(22px,3vh,34px);color:var(--blue-300);text-shadow:0 2px 8px rgba(0,0,0,.5)}
.slot-back{background:linear-gradient(180deg,#1d4ed8,var(--blue-900));border:2px solid var(--gold-400);transform:rotateX(180deg);justify-content:space-between;gap:14px;box-shadow:0 0 26px rgba(79,152,255,.35)}
.slot-back .atxt{font-family:Inter;font-weight:800;font-size:clamp(17px,2.6vh,27px);text-transform:uppercase;letter-spacing:.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slot-back .apts{font-family:Inter;font-weight:900;font-size:clamp(19px,3vh,30px);color:var(--camel-300);background:rgba(0,0,0,.28);border-radius:10px;padding:3px 14px;flex:none}
.slot-back .who{font-size:11px;color:var(--blue-200);font-weight:700;flex:none}
.qr-stage{display:flex;gap:26px;align-items:center;justify-content:center;flex-wrap:wrap;flex:1}
.qr-white{background:#fff;padding:16px;border-radius:18px;box-shadow:0 0 60px rgba(79,152,255,.4);animation:qrIn .6s cubic-bezier(.2,.8,.3,1.2)}
@keyframes qrIn{from{transform:scale(.6);opacity:0}}
.qr-side{text-align:left;max-width:380px}
.qr-side h3{font-size:clamp(18px,2.2vw,28px);font-weight:800;margin-bottom:8px}
.qr-side .joincode{font-family:Inter;font-weight:900;font-size:clamp(26px,3.4vw,44px);letter-spacing:.24em;color:var(--gold-300);background:rgba(0,0,0,.3);border-radius:12px;padding:6px 18px;display:inline-block;margin:8px 0}
.qr-side .cnt-line{font-size:clamp(14px,1.6vw,19px);color:var(--blue-100)}
.qr-side .cnt-line b{font-family:Inter;font-size:clamp(24px,3vw,40px);color:#fff}
.stage-status{display:flex;gap:12px;align-items:center;justify-content:center;padding:10px 26px 16px;flex-wrap:wrap}
.status-chip{background:rgba(255,255,255,.08);border:1.5px solid rgba(129,193,255,.3);border-radius:999px;padding:8px 20px;font-size:clamp(12px,1.3vw,15px);font-weight:700;display:flex;gap:8px;align-items:center}
.status-chip.hot{border-color:var(--gold-400);background:rgba(203,163,68,.18);animation:pulse 1.4s infinite}
@keyframes pulse{50%{box-shadow:0 0 22px rgba(203,163,68,.5)}}
.status-dot{width:9px;height:9px;border-radius:50%;background:var(--green-500)}
.status-dot.off{background:var(--ink-400)}
.status-dot.hot{background:var(--camel-400);box-shadow:0 0 10px var(--camel-400)}
.idle-hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center}
.idle-hero img{width:min(380px,55vw);filter:drop-shadow(0 20px 50px rgba(0,0,0,.5))}
.idle-hero p{color:var(--blue-200);font-size:clamp(14px,1.6vw,19px);margin:0}
.buzz-banner{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(5,10,30,.82);z-index:60;animation:fadeIn .18s}
.buzz-banner .inner{text-align:center;animation:popIn .35s cubic-bezier(.2,.9,.3,1.3)}
.buzz-banner .who{font-family:Inter;font-weight:900;font-size:clamp(40px,8vw,110px);text-shadow:0 6px 40px rgba(0,0,0,.6)}
.buzz-banner .lbl{font-family:Inter;font-weight:800;letter-spacing:.3em;color:var(--gold-300);font-size:clamp(14px,2vw,22px)}
@keyframes popIn{from{transform:scale(.5);opacity:0}}
@keyframes fadeIn{from{opacity:0}}
.wrongX{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:70;pointer-events:none}
.wrongX span{font-family:Inter;font-weight:900;font-size:clamp(160px,40vh,420px);color:var(--red-500);text-shadow:0 0 80px rgba(234,79,73,.7);animation:xIn .8s forwards}
@keyframes xIn{0%{transform:scale(.3);opacity:0}18%{transform:scale(1.15);opacity:1}75%{transform:scale(1);opacity:1}100%{opacity:0}}
.overlay-screen{position:fixed;inset:0;background:var(--stage-bg);z-index:55;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:30px;text-align:center;animation:fadeIn .4s}
.overlay-screen h2{font-family:Inter;font-weight:900;font-size:clamp(30px,5vw,64px);color:#fff}
.overlay-screen .sub{color:var(--gold-300);font-family:Inter;font-weight:800;letter-spacing:.2em;font-size:clamp(13px,1.6vw,18px)}
.rank-row{display:flex;align-items:center;gap:18px;background:rgba(255,255,255,.07);border:2px solid rgba(129,193,255,.25);border-radius:16px;padding:16px 28px;width:min(640px,92vw);animation:slideUp .5s both}
.rank-row.win{border-color:var(--gold-400);box-shadow:0 0 40px rgba(203,163,68,.35)}
.rank-row:nth-child(odd){animation-delay:.1s}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}}
.rank-pos{font-family:Inter;font-weight:900;font-size:30px;color:var(--gold-300);width:44px}
.rank-name{font-family:Inter;font-weight:800;font-size:clamp(20px,2.6vw,32px);color:#fff;flex:1;text-align:left;display:flex;align-items:center;gap:10px}
.rank-score{font-family:Inter;font-weight:900;font-size:clamp(26px,3.4vw,44px);color:var(--camel-300);font-variant-numeric:tabular-nums}
.crown{font-family:Inter;font-weight:800;font-size:12px;background:var(--gold-500);color:#fff;border-radius:999px;padding:3px 10px;letter-spacing:.1em}
.winners-list{color:var(--blue-100);font-size:clamp(14px,1.8vw,19px);line-height:1.7}
.mainbuzz-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.mainbuzz{border-radius:16px;padding:14px 30px;font-family:Inter;font-weight:900;font-size:clamp(15px,1.8vw,20px);color:#fff;border:2.5px solid rgba(255,255,255,.35);text-shadow:0 2px 6px rgba(0,0,0,.4);min-width:170px}
.mainbuzz:hover{filter:brightness(1.15)}
.mainbuzz[disabled]{opacity:.4}
.kbd-hint{font-size:11.5px;color:var(--blue-300);letter-spacing:.03em}

/* ================= survey ================= */
.survey{min-height:100vh;background:var(--stage-bg);display:flex;flex-direction:column;align-items:center;padding:26px 18px;color:#fff}
.survey img.logo{width:min(230px,58vw);filter:drop-shadow(0 10px 30px rgba(0,0,0,.5));margin-bottom:6px}

<script>
'use strict';
/* ==========================================================================
   CONFIG — edit these values
   ========================================================================== */
const ADMIN_PASSWORD = '1234';           // admin portal password — change me
const FIREBASE_CONFIG = {
  // Paste your Firebase web-app config here to enable live multi-device sync.
  // Leave apiKey empty to run in LOCAL DEMO MODE (same-browser tabs only).
  apiKey: '',
  authDomain: '',
  databaseURL: '',
  projectId: '',
  storageBucket: '',
  messagingSenderId: '',

const APP_ROOT = 'cssfeud';              // Firebase root node

/* ========================= utils ========================= */
const $ = s => document.querySelector(s);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = () => Math.random().toString(36).slice(2, 10);
const param = k => new URLSearchParams(location.search).get(k);
const clone = o => JSON.parse(JSON.stringify(o));
const fmtT = t => new Date(t).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
function setPath(obj, path, val){
  const p = path.split('.'); let o = obj;
  for (let i = 0; i < p.length - 1; i++) o = o[p[i]];
  o[p[p.length - 1]] = val;
}
function normTxt(s){ return String(s||'').toLowerCase().replace(/[^\p{L}\p{N}\s]/gu,'').replace(/\s+/g,' ').trim(); }
function lev(a, b){
  if (a === b) return 0;
  const m = a.length, n = b.length;
  if (!m || !n) return m + n;
  let prev = Array.from({length: n + 1}, (_, i) => i);
  for (let i = 1; i <= m; i++){
    const cur = [i];
    for (let j = 1; j <= n; j++)
      cur[j] = Math.min(prev[j] + 1, cur[j-1] + 1, prev[j-1] + (a[i-1] === b[j-1] ? 0 : 1));
    prev = cur;
  }
  return prev[n];
}
function similar(a, b){
  if (!a || !b) return false;
  if (a === b) return true;
  const d = lev(a, b);
  return (d <= 1 && a.length > 3) || (d <= 2 && a.length > 6);
}
function toast(msg){
  const slot = $('#toast-slot');
  slot.innerHTML = '<div class="toast">' + esc(msg) + '</div>';
  clearTimeout(toast._t);
  toast._t = setTimeout(() => slot.innerHTML = '', 2600);
}
function download(name, text, type){
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: type || 'text/plain'}));
  a.download = name; a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}

/* ========================= sound ========================= */
let MUTED = localStorage.getItem('cf:muted') === '1';
let AC = null;
function ac(){
  AC = AC || new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume();
  return AC;
}
function tone(f, when, dur, type, vol, slide){
  if (MUTED) return;
  try {
    const c = ac(), o = c.createOscillator(), g = c.createGain(), t = c.currentTime + when;
    o.type = type || 'sine'; o.frequency.setValueAtTime(f, t);
    if (slide) o.frequency.exponentialRampToValueAtTime(slide, t + dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol || .18, t + .015);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(c.destination); o.start(t); o.stop(t + dur + .05);
  } catch(e){}
}
const SND = {
  buzzer(){ tone(170, 0, .55, 'sawtooth', .22); tone(120, 0, .55, 'square', .12); },
  correct(){ tone(660, 0, .14, 'triangle', .2); tone(880, .13, .22, 'triangle', .2); },
  points(){ tone(523, 0, .1, 'triangle', .16); tone(659, .09, .1, 'triangle', .16); tone(784, .18, .18, 'triangle', .18); },
  wrong(){ tone(160, 0, .32, 'sawtooth', .2); tone(110, .3, .5, 'sawtooth', .22); },
  reveal(){ tone(320, 0, .3, 'sine', .16, 640); tone(640, .22, .18, 'triangle', .14); },
  round(){ [523, 659, 784, 1046].forEach((f, i) => tone(f, i * .12, .2, 'triangle', .17)); },
  win(){ [523, 659, 784, 1046, 784, 1046, 1318].forEach((f, i) => tone(f, i * .15, .25, 'triangle', .18)); tone(262, 0, 1.4, 'sine', .1); }
};

/* ========================= confetti ========================= */
function confetti(dur){
  const cv = $('#confetti'), ctx = cv.getContext('2d');
  cv.width = innerWidth; cv.height = innerHeight;
  const cols = ['#CBA344', '#F8C027', '#4F98FF', '#81C1FF', '#EA4F49', '#4A9D5C', '#ffffff'];
  const ps = Array.from({length: 180}, () => ({
    x: Math.random() * cv.width, y: -20 - Math.random() * cv.height * .5,
    w: 6 + Math.random() * 7, h: 8 + Math.random() * 10,
    vy: 2 + Math.random() * 3.5, vx: -1.5 + Math.random() * 3,
    r: Math.random() * Math.PI, vr: -.1 + Math.random() * .2,
    c: cols[Math.floor(Math.random() * cols.length)]
  }));
  const end = Date.now() + (dur || 4000);
  (function frame(){
    ctx.clearRect(0, 0, cv.width, cv.height);
    if (Date.now() > end){ return; }
    ps.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.r += p.vr;
      if (p.y > cv.height + 20){ p.y = -20; p.x = Math.random() * cv.width; }
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.r);
      ctx.fillStyle = p.c; ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h); ctx.restore();
    });
    requestAnimationFrame(frame);
  })();
}

/* ========================= backends ========================= */
const HAS_FB = !!FIREBASE_CONFIG.apiKey;
function makeLocalBackend(){
  const bc = 'BroadcastChannel' in window ? new BroadcastChannel('cssfeud') : null;
  const subs = [];
  const K = {
    state: g => 'cf:' + g + ':state',
    resp: (g, q) => 'cf:' + g + ':resp:' + q,
    buzz: g => 'cf:' + g + ':buzz'
  };
  const get = (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch(e){ return d; } };
  const put = (k, v) => { localStorage.setItem(k, JSON.stringify(v)); if (bc) bc.postMessage(k); route(k, true); };
  function route(k, self){
    subs.forEach(s => { if (s.k === k && (!self || s.echo)) s.cb(get(k, null)); });
  }
  addEventListener('storage', e => { if (e.key && e.key.startsWith('cf:')) route(e.key); });
  if (bc) bc.onmessage = e => route(e.data);
  return {
    kind: 'local', now: () => Date.now(),
    async init(){},
    async getActive(){ return get('cf:active', null); },
    setActive(g){ localStorage.setItem('cf:active', g); },
    async loadState(g){ return get(K.state(g), null); },
    saveState(s){ put(K.state(s.id), s); },
    onState(g, cb){ subs.push({k: K.state(g), cb, echo: false}); },
    async loadResp(g, q){ return get(K.resp(g, q), {}); },
    submitResp(g, q, dev, text){ const m = get(K.resp(g, q), {}); m[dev] = {text, ts: Date.now()}; put(K.resp(g, q), m); },
    clearResp(g, q){ put(K.resp(g, q), {}); },
    onResp(g, q, cb){ const s = {k: K.resp(g, q), cb, echo: true}; subs.push(s); cb(get(s.k, {})); return () => subs.splice(subs.indexOf(s), 1); },
    pressBuzz(g, team){ const l = get(K.buzz(g), []); l.push({team, t: Date.now(), id: uid()}); put(K.buzz(g), l.slice(-60)); },
    clearBuzz(g){ put(K.buzz(g), []); },
    onBuzz(g, cb){ const s = {k: K.buzz(g), cb, echo: true}; subs.push(s); cb(get(s.k, [])); },
    async getIndex(){ return get('cf:index', {}); },
    setIndex(g, meta){ const i = get('cf:index', {}); i[g] = meta; localStorage.setItem('cf:index', JSON.stringify(i)); },
    removeGame(g){ localStorage.removeItem(K.state(g)); localStorage.removeItem(K.buzz(g));
      for (let i = 0; i < 60; i++) localStorage.removeItem(K.resp(g, i));
      const idx = get('cf:index', {}); delete idx[g]; localStorage.setItem('cf:index', JSON.stringify(idx)); }
  };
}
function makeFirebaseBackend(){
  let db = null, offset = 0;
  const P = g => APP_ROOT + '/games/' + g;
  function loadScript(src){ return new Promise((res, rej) => { const s = document.createElement('script'); s.src = src; s.onload = res; s.onerror = rej; document.head.appendChild(s); }); }
  return {
    kind: 'firebase', now: () => Date.now() + offset,
    async init(){
      const v = '10.12.2';
      await loadScript('https://www.gstatic.com/firebasejs/' + v + '/firebase-app-compat.js');
      await loadScript('https://www.gstatic.com/firebasejs/' + v + '/firebase-auth-compat.js');
      await loadScript('https://www.gstatic.com/firebasejs/' + v + '/firebase-database-compat.js');
      firebase.initializeApp(FIREBASE_CONFIG);
      db = firebase.database();
      try { await firebase.auth().signInAnonymously(); } catch(e){ console.warn('Anonymous auth unavailable:', e.message); }
      db.ref('.info/serverTimeOffset').on('value', s => offset = s.val() || 0);
    },
    async getActive(){ return (await db.ref(APP_ROOT + '/active').once('value')).val(); },
    setActive(g){ db.ref(APP_ROOT + '/active').set(g); },
    async loadState(g){ return (await db.ref(P(g) + '/state').once('value')).val(); },
    saveState(s){ db.ref(P(s.id) + '/state').set(JSON.parse(JSON.stringify(s))); },
    onState(g, cb){ let first = true; db.ref(P(g) + '/state').on('value', s => { if (first){ first = false; return; } cb(s.val()); }); },
    async loadResp(g, q){ return (await db.ref(P(g) + '/resp/' + q).once('value')).val() || {}; },
    submitResp(g, q, dev, text){ db.ref(P(g) + '/resp/' + q + '/' + dev).set({text, ts: firebase.database.ServerValue.TIMESTAMP}); },
    clearResp(g, q){ db.ref(P(g) + '/resp/' + q).remove(); },
    onResp(g, q, cb){ const r = db.ref(P(g) + '/resp/' + q), f = s => cb(s.val() || {}); r.on('value', f); return () => r.off('value', f); },
    pressBuzz(g, team){ db.ref(P(g) + '/buzz').push({team, t: firebase.database.ServerValue.TIMESTAMP, id: uid()}); },
    clearBuzz(g){ db.ref(P(g) + '/buzz').remove(); },
    onBuzz(g, cb){ db.ref(P(g) + '/buzz').on('value', s => { const v = s.val() || {}; cb(Object.values(v)); }); },
    async getIndex(){ return (await db.ref(APP_ROOT + '/index').once('value')).val() || {}; },
    setIndex(g, meta){ db.ref(APP_ROOT + '/index/' + g).set(meta); },
    removeGame(g){ db.ref(P(g)).remove(); db.ref(APP_ROOT + '/index/' + g).remove(); }
  };
}
const Backend = HAS_FB ? makeFirebaseBackend() : makeLocalBackend();

/* ========================= state ========================= */
function defaultState(id, title){
  return {
    id, rev: 0, writer: '', title: title || 'CSS Feud', createdAt: Date.now(), demo: false,
    joinCode: id.slice(-4).toUpperCase(),
    teams: [
      {name: 'Team 1', color: '#CBA344', logo: '', players: ['', '', '', '', ''], score: 0, playerIdx: 0},
      {name: 'Team 2', color: '#4F98FF', logo: '', players: ['', '', '', '', ''], score: 0, playerIdx: 0}
    ],
    questions: [], qIdx: 0,
    phase: 'idle',            // idle | survey | review | board | roundEnd | final
    surveyOpen: false, surveyEndsAt: 0, surveySession: 0,
    review: [], board: [], roundPoints: [0, 0], turn: null,
    buzz: {open: false, openedAt: 0},
    paused: false, history: [], log: [], fx: {n: 0, type: ''}
  };
}
function blankQ(text){
  return {id: uid(), text: text || '', category: '', image: '', timeLimit: 0, maxAnswers: 6, preRaw: '', notes: ''};
}
function demoState(){

}
const DEMO_POOLS = [
  ['Coffee', 'coffee', 'Make coffee', 'Get coffe', 'Check email', 'check emails', 'Emails', 'Say good morning', 'good morning to everyone', 'Open laptop', 'open the laptop', 'Chat with colleagues', 'Karak', 'karak tea', 'Breakfast', 'Check WhatsApp', 'Coffee', 'check email', 'Coffee', 'Prayer', 'Open Teams', 'coffee first', 'Say hi', 'Check calendar'],
  ['Charger', 'laptop charger', 'Pen', 'a pen', 'Notebook', 'The agenda', 'agenda', 'Coffee', 'Their laptop', 'Meeting room booking', 'To join on time', 'Water', 'charger', 'Pen and paper', 'The meeting link'],
  ['Biryani', 'biryani', 'Shawarma', 'shawerma', 'Burger', 'burgers', 'Sushi', 'Salad', 'salads', 'Pasta', 'Manakish', 'Grilled chicken', 'biryani', 'Shawarma', 'Kebab', 'Poke bowl']
];

/* ========================= app globals ========================= */
const MODE = param('mode') || 'home';
let GID = '', S = null, RESP = {}, BUZZ = [], INDEX = {};
let DEVICE = localStorage.getItem('cf:dev');
if (!DEVICE){ DEVICE = 'd' + uid(); localStorage.setItem('cf:dev', DEVICE); }
let ADMIN_OK = sessionStorage.getItem('cf:admin') === '1';
let ADMIN_TAB = 'live';
let UNDO = [], REDO = [];
let lastFxN = 0, lastWinner = null, BANNER_UNTIL = 0, RESPUNSUB = null, SUBQ = -1, AUTOCLOSED = 0;
let EDIT_Q = null; // expanded question editor

const curQ = () => (S && S.questions[S.qIdx]) || null;
const tname = i => S.teams[i] ? (S.teams[i].name || ('Team ' + (i + 1))) : '';
const baseURL = () => location.origin + location.pathname;
const surveyURL = () => baseURL() + '?mode=survey&game=' + GID;
const buzzerURL = t => baseURL() + '?mode=buzzer&team=' + t + '&game=' + GID;
const answeredKey = () => 'cf:answered:' + GID + ':' + (S ? S.qIdx : 0) + ':' + (S ? S.surveySession : 0);

/* ========================= persistence / undo / fx ========================= */
function addLog(msg){
  S.log.unshift({t: Date.now(), msg});
  if (S.log.length > 250) S.log.length = 250;
}
function pushUndo(){ UNDO.push(clone(S)); if (UNDO.length > 40) UNDO.shift(); REDO = []; }
function persist(){
  S.rev = (S.rev || 0) + 1; S.writer = DEVICE; S.updated = Date.now();
  Backend.saveState(S);
  Backend.setIndex(GID, {title: S.title, t: Date.now(), demo: !!S.demo});
  render();
}
function mutate(fn, logMsg){
  pushUndo();
  fn();
  if (logMsg) addLog(logMsg);
  persist();
}
function fire(type, team){
  S.fx = {n: (S.fx ? S.fx.n : 0) + 1, type, team: team ?? null};
  lastFxN = S.fx.n;
  runFx(S.fx);
}
function runFx(fx){
  if (fx.type === 'wrong'){
    SND.wrong();
    if (MODE === 'game' || MODE === 'buzzer'){ $('#fxlayer').innerHTML = '<div class="wrongX"><span>✕</span></div>'; setTimeout(() => $('#fxlayer').innerHTML = '', 950); }
  }
  else if (fx.type === 'correct') SND.correct();
  else if (fx.type === 'points') SND.points();
  else if (fx.type === 'reveal') SND.reveal();
  else if (fx.type === 'board') SND.points();
  else if (fx.type === 'round') SND.round();
  else if (fx.type === 'win'){ SND.win(); if (MODE !== 'survey') confetti(5000); }
}
function handleRemote(st){
  if (!st) return;
  if (st.writer === DEVICE && st.rev <= (S ? S.rev : 0)) return;
  S = st;
  if (S.fx && S.fx.n !== lastFxN){ lastFxN = S.fx.n; runFx(S.fx); }
  subResp(); render();
}
function subResp(){
  if (!S) return;
  if (SUBQ === S.qIdx) return;
  SUBQ = S.qIdx;
  if (RESPUNSUB) RESPUNSUB();
  RESPUNSUB = Backend.onResp(GID, S.qIdx, m => { RESP = m || {}; render(); });
}
function validPresses(){
  if (!S || !S.buzz) return [];
  return (BUZZ || []).filter(p => p.t >= (S.buzz.openedAt || 0)).sort((a, b) => a.t - b.t);
}
function derivedWinner(){
  if (!S || !S.buzz || !S.buzz.open) return null;
  const ps = validPresses();
  return ps.length ? ps[0].team : null;
}
function handleBuzz(){
  const w = derivedWinner();
  if (w !== lastWinner){
    lastWinner = w;
    if (w !== null){
      SND.buzzer();
      BANNER_UNTIL = Date.now() + 2400;
      setTimeout(render, 2500);
      if (MODE === 'admin' && ADMIN_OK && S.phase === 'board' && S.turn === null){
        mutate(() => { S.turn = w; }, 'Buzz — ' + tname(w) + ' buzzed first, takes the turn');
        return;
      }
    }
  }
  render();
}

/* ========================= review grouping ========================= */
function parsePre(q){
  return String(q.preRaw || '').split('\n').map(l => {
    const m = l.split('|');
    const text = (m[0] || '').trim();
    const pts = parseInt((m[1] || '').trim(), 10);
    return text ? {text, pts: isNaN(pts) ? 0 : pts} : null;
  }).filter(Boolean);
}
function buildGroups(){
  const q = curQ();
  const groups = [];
  parsePre(q).forEach(p => groups.push({id: uid(), name: p.text, count: 0, points: p.pts, include: true, members: [], pre: true}));
  Object.values(RESP || {}).sort((a, b) => (a.ts || 0) - (b.ts || 0)).forEach(r => {
    const raw = String(r.text || '').replace(/\s+/g, ' ').trim().slice(0, 80);
    const n = normTxt(raw);
    if (!n) return;
    let g = groups.find(g => normTxt(g.name) === n || g.members.some(m => normTxt(m) === n));
    if (!g) g = groups.find(g => similar(normTxt(g.name), n));
    if (g){ g.count++; g.members.push(raw); }
    else groups.push({id: uid(), name: raw[0].toUpperCase() + raw.slice(1), count: 1, points: 0, include: true, members: [raw], pre: false});
  });
  groups.forEach(g => { if (!g.pre || g.count > 0) g.points = Math.max(g.count, g.pre ? g.points : g.count); });
  groups.sort((a, b) => (b.points || b.count) - (a.points || a.count));
  return groups;
}
function mergeSuggestions(){
  const out = [];
  const r = S.review || [];
  for (let i = 0; i < r.length; i++)
    for (let j = i + 1; j < r.length; j++)
      if (similar(normTxt(r[i].name), normTxt(r[j].name))) out.push([r[i], r[j]]);
  return out.slice(0, 5);
}

/* ========================= data binding ========================= */
function bindChange(el){
  const path = el.dataset.bind;
  let v = el.type === 'checkbox' ? el.checked : el.value;
  if (el.dataset.type === 'num') v = parseFloat(v) || 0;
  pushUndo();
  try { setPath(S, path, v); } catch(e){ return; }
  if (/^teams\.\d\.score$/.test(path)) addLog('Score edited: ' + tname(+path.split('.')[1]) + ' → ' + v);
  if (/^teams\.\d\.playerIdx$/.test(path)) addLog('Current player changed for ' + tname(+path.split('.')[1]));
  if (/^review\.\d+\.(name|points)$/.test(path)) { /* silent */ }
  persist();
}

/* ========================= renderers ========================= */
function captureFocus(){
  const el = document.activeElement;
  if (!el || el === document.body) return null;
  const key = el.dataset && el.dataset.bind ? 'bind:' + el.dataset.bind : (el.id ? 'id:' + el.id : null);
  if (!key) return null;
  return {key, start: el.selectionStart, end: el.selectionEnd, value: el.value};
}
function restoreFocus(f){
  if (!f) return;
  const el = f.key.startsWith('bind:')
    ? document.querySelector('[data-bind="' + CSS.escape(f.key.slice(5)) + '"]')
    : document.getElementById(f.key.slice(3));
  if (!el) return;
  el.focus();
  if (f.value !== undefined && 'value' in el && el.type !== 'checkbox' && el.type !== 'color' && el.value !== f.value) el.value = f.value;
  try { if (f.start != null && el.setSelectionRange) el.setSelectionRange(f.start, f.end); } catch(e){}
}
function drawQRs(){
  if (typeof QRCode === 'undefined') return;
  document.querySelectorAll('[data-qr]').forEach(el => {
    el.innerHTML = '';
    try {
      new QRCode(el, {text: el.dataset.qr, width: +(el.dataset.size || 200), height: +(el.dataset.size || 200), colorDark: '#0E0F12', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M});
    } catch(e){ el.textContent = el.dataset.qr; }
  });
}
function render(){
  const root = $('#root');
  if (!root) return;
  const f = captureFocus();
  let html;
  if (!S && MODE !== 'home') html = '<div class="launch"><p>Loading…</p></div>';
  else if (MODE === 'admin') html = ADMIN_OK ? renderAdmin() : renderLogin();
  else if (MODE === 'game') html = renderGame();
  else if (MODE === 'survey') html = renderSurvey();
  else if (MODE === 'buzzer') html = renderBuzzer();
  else if (MODE === 'guide') html = renderGuide();
  else html = renderLauncher();
  root.innerHTML = html;
  drawQRs();
  restoreFocus(f);
}

function phasePill(){

function roundEndOverlay(){

function finalOverlay(){
  const order = S.teams[0].score >= S.teams[1].score ? [0, 1] : [1, 0];

  return '<div class="overlay-screen"><div class="sub">FINAL LEADERBOARD</div>' +
    '<h2>' + (tie ? 'It is a tie!' : '🏆 ' + esc(tname(order[0])) + ' wins!') + '</h2>' +

    '</div>';
}

/* ---------- buzzer ---------- */
function renderBuzzer(){
  const team = Math.max(0, Math.min(1, (+param('team') || 1) - 1));

  const w = derivedWinner();
  const open = S.buzz.open && !S.paused;
  let cls = 'thebuzzer', label = 'BUZZ!', state = '';

  else { cls += ' locked'; label = 'TOO LATE'; state = esc(tname(w)) + ' buzzed first'; }
  return '<div class="buzzpage"><a class="back-btn" href="' + baseURL() + '">← Back</a><div class="head">' + LOGO +
    '<div class="tname" style="color:' + esc(t.color) + '">' + esc(tname(team)) + '</div></div>' +

    '<div class="buzz-state">' + state + '</div></div>';
}

/* ---------- import ---------- */
function importJson(file){
  const r = new FileReader();
  r.onload = () => {
    try {
      const st = JSON.parse(r.result);
      if (!st.teams || !st.questions) throw new Error('bad');
      st.id = st.id || ('g' + Date.now().toString(36));
      GID = st.id; S = st; SUBQ = -1;
      Backend.setActive(GID);
      addLog('Game imported from JSON');
      persist(); wireGame(); toast('Game imported');
    } catch(e){ toast('That file is not a valid CSS Feud export'); }
  };
  r.readAsText(file);
}

/* ========================= wiring ========================= */
function wireGame(){
  Backend.onState(GID, handleRemote);
  Backend.onBuzz(GID, list => { BUZZ = (list || []).sort((a, b) => a.t - b.t); handleBuzz(); });
  SUBQ = -1; subResp();
  refreshIndex();
}
async function refreshIndex(){ try { INDEX = await Backend.getIndex(); } catch(e){ INDEX = {}; } }

document.addEventListener('click', e => {
  const el = e.target.closest('[data-act]');
  if (!el) return;
  const fn = ACT[el.dataset.act];
  if (fn) fn(el.dataset, el);
});
document.addEventListener('change', e => {
  if (e.target.id === 'import-file'){ if (e.target.files[0]) importJson(e.target.files[0]); return; }
  const el = e.target.closest('[data-bind]');
  if (el && (MODE !== 'admin' || ADMIN_OK)) bindChange(el);
});
document.addEventListener('keydown', e => {
  const tag = (e.target.tagName || '').toLowerCase();
  if (e.key === 'Enter'){
    const t = e.target.closest ? e.target.closest('[data-enter]') : null;
    if (t){ e.preventDefault(); const fn = ACT[t.dataset.enter]; if (fn) fn({}); return; }
  }
  if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
  if (MODE !== 'game' && MODE !== 'admin') return;
  if (e.key === '1') tryBuzz(0);
  else if (e.key === '2') tryBuzz(1);
  else if (e.key === 'b' || e.key === 'B'){ if (S && S.buzz && (MODE === 'admin' ? ADMIN_OK : true)) ACT.resetBuzzers(); }
});
setInterval(() => {
  if (!S) return;
  if (S.surveyOpen && S.surveyEndsAt){
    const left = Math.max(0, Math.ceil((S.surveyEndsAt - Backend.now()) / 1000));
    document.querySelectorAll('[data-timer]').forEach(el => el.textContent = left);
    if (left <= 0 && MODE === 'admin' && ADMIN_OK && AUTOCLOSED !== S.qIdx + 1){
      AUTOCLOSED = S.qIdx + 1;
      ACT.closeSurvey();
      toast('Time is up — survey closed automatically');
    }
  }
}, 500);
addEventListener('resize', () => { const cv = $('#confetti'); if (cv){ cv.width = innerWidth; cv.height = innerHeight; } });

/* ========================= boot ========================= */
(async function main(){
  if (MODE === 'home'){ render(); }
  try { await Backend.init(); }
  catch(e){ console.error('Backend init failed', e); toast('Could not reach Firebase — check your config'); }
  GID = param('game') || (await Backend.getActive()) || 'demo';
  S = await Backend.loadState(GID);
  if (!S){
    if (GID === 'demo'){
      S = demoState();
      DEMO_POOLS[0].forEach((t, i) => Backend.submitResp('demo', 0, 'demo' + i, t));
      addLog('Demo game created');
    } else S = defaultState(GID);
    S.rev = 1; S.writer = DEVICE;
    Backend.saveState(S);
    Backend.setIndex(GID, {title: S.title, t: Date.now(), demo: !!S.demo});
  }
  lastFxN = S.fx ? S.fx.n : 0;
  lastWinner = null;
  wireGame();
  render();
})();

</script>
</body>
</html>
