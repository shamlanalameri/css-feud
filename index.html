<!--
  ============================================================
  CSS FEUD — live employee game show (React + Vite build)
  One app. Five modes via URL query string:
    /?mode=admin           Admin / host / judge portal (password: see src/config.js)
    /?mode=game            Main screen for the big display
    /?mode=survey          Employee survey page (via QR)
    /?mode=buzzer&team=1   Team 1 buzzer
    /?mode=buzzer&team=2   Team 2 buzzer

  FIREBASE + HOSTING: see README.md and src/config.js.
  Without Firebase the game runs in LOCAL DEMO MODE (same-browser tabs).
  ============================================================
-->
